<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantenimiento Frigomerc — Resumen de notificación de OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-dk:#0C447C;--blue-lt:#E6F1FB;
  --green:#3B6D11;--green-lt:#EAF3DE;
  --amber:#854F0B;--amber-lt:#FAEEDA;
  --red:#A32D2D;--red-lt:#FCEBEB;
  --gold:#B8860B;--silver:#707070;--bronze:#8B4513;
  --border:#e0ddd6;--bg:#0f1923;--white:#fff;
  --text:#fff;--muted:rgba(255,255,255,.6);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.1);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.header-logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.header-logo span{color:var(--blue-lt)}
.header-right{display:flex;align-items:center;gap:16px}
.sync-status{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-refresh{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.btn-refresh:hover{background:rgba(255,255,255,.15)}
.btn-export{background:var(--blue);border:1px solid var(--blue);color:#fff;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.btn-export:hover{background:var(--blue-dk)}

/* MAIN */
.main{flex:1;padding:24px 32px}
.semana-label{font-size:13px;color:var(--muted);margin-bottom:20px;text-align:center;text-transform:uppercase;letter-spacing:.08em}

/* RANKING TABLE */
.ranking-wrap{max-width:900px;margin:0 auto}
.ranking-table{width:100%;border-collapse:collapse}
.ranking-table thead tr{border-bottom:2px solid rgba(255,255,255,.15)}
.ranking-table th{padding:14px 20px;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:left}
.ranking-table th:nth-child(3),
.ranking-table th:nth-child(4){text-align:center}
.ranking-table tbody tr{border-bottom:1px solid rgba(255,255,255,.07);transition:background .15s}
.ranking-table tbody tr:hover{background:rgba(255,255,255,.04)}

/* POSICION */
.pos-cell{padding:16px 20px;width:80px}
.pos-badge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.pos-1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#000;box-shadow:0 0 20px rgba(255,215,0,.4)}
.pos-2{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#000}
.pos-3{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff}
.pos-other{background:rgba(255,255,255,.1);color:var(--muted)}

/* NOMBRE */
.nombre-cell{padding:16px 20px}
.tec-row{display:flex;align-items:center;gap:14px}
.tec-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.tec-nombre{font-size:18px;font-weight:700}
.tec-legajo{font-size:12px;color:var(--muted);margin-top:2px}

/* HORAS */
.horas-cell{padding:16px 20px;text-align:center;width:220px}
.horas-value{font-size:32px;font-weight:800;line-height:1}
.horas-label{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.horas-bar-wrap{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:8px;overflow:hidden}
.horas-bar{height:100%;border-radius:2px;transition:width .5s ease}

/* PENDIENTES */
.pend-cell{padding:16px 20px;text-align:center;width:180px}
.pend-badge{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:12px;font-size:26px;font-weight:800}
.pend-0{background:rgba(59,109,17,.25);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.pend-low{background:rgba(133,79,11,.25);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.pend-high{background:rgba(163,45,45,.25);color:#f87171;border:1px solid rgba(248,113,113,.3)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;color:var(--muted);font-size:15px}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--blue-lt);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer{padding:12px 32px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
.countdown{display:flex;align-items:center;gap:6px}
.countdown-bar{width:100px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.countdown-fill{height:100%;background:var(--blue-lt);border-radius:2px;transition:width 1s linear}

/* EXPORT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.modal-overlay.open{display:flex}
.modal{background:#1a2535;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:28px;max-width:400px;width:90%}
.modal-title{font-size:18px;font-weight:700;margin-bottom:8px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.modal-btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.modal-cancel{background:rgba(255,255,255,.1);color:#fff}
.modal-confirm{background:var(--blue);color:#fff}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <span>⚙️</span>
    <div>
      <div>Mantenimiento Frigomerc — Resumen de notificación de OS</div>
      <div style="font-size:12px;color:var(--muted);font-weight:400" id="semana-label"></div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">Cargando…</span>
    </div>
    <button class="btn-refresh" onclick="cargar()">↻ Actualizar</button>
    <button class="btn-export" onclick="abrirExport()">↓ Exportar Macro SAP</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><div class="spinner"></div><span>Cargando datos…</span></div>
</div>

<div class="footer">
  <span id="footer-total"></span>
  <div class="countdown">
    <span style="font-size:11px">Próxima actualización:</span>
    <div class="countdown-bar"><div class="countdown-fill" id="countdown-fill" style="width:100%"></div></div>
    <span id="countdown-text">5:00</span>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Exportar para Macro SAP</div>
    <div class="modal-sub">Se exportarán las operaciones <strong>notificadas</strong> que no tienen <strong>Cerrado en SAP</strong>. El archivo quedará listo para usar en la macro.</div>
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-btn modal-confirm" onclick="exportarSAP()">↓ Descargar Excel</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWiXOIIDt4vN5v_05l7gyiXncimja3964vVPgEIz4BpD3RHUz2nYp4vTSXDLNVu0k/exec';
const REFRESH_SEC = 300; // 5 minutos

let OPS = [];
let countdownSec = REFRESH_SEC;
let countdownInterval = null;

// ── UTILS ──────────────────────────────────────────────────────
function normF(val){
  if(!val&&val!==0) return '';
  const s=String(val).trim();
  if(!s||s==='0') return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){ const p=s.split('/'); return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0'); }
  if(/^\d+(\.\d+)?$/.test(s)){ const n=parseFloat(s); if(n>1000){ const d=new Date(Date.UTC(1899,11,30)+n*86400000); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); } }
  try{ const d=new Date(val); if(!isNaN(d.getTime())){ const u=new Date(d.getTime()-d.getTimezoneOffset()*60000); return u.toISOString().slice(0,10); } }catch(e){}
  return '';
}
function calcH(ini,fin){
  const toMin=t=>{ if(!t) return -1; const s=String(t).replace(/:\d{2}$/,''); const p=s.split(':'); const h=parseInt(p[0]),m=parseInt(p[1]||0); return isNaN(h)||isNaN(m)?-1:h*60+m; };
  const d=toMin(fin)-toMin(ini); return d>0?d/60:0;
}
function hoyKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function lunesKey(){
  const d=new Date(); const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1);
  const l=new Date(d); l.setDate(diff);
  return l.getFullYear()+'-'+String(l.getMonth()+1).padStart(2,'0')+'-'+String(l.getDate()).padStart(2,'0');
}
function fmtSemana(){
  const l=lunesKey(), h=hoyKey();
  const fmt=iso=>{ const[y,m,d]=iso.split('-'); return d+'/'+m; };
  return 'Semana: '+fmt(l)+' – '+fmt(h)+'/'+h.split('-')[0];
}
function avatarColor(nombre){
  const colors=['#185FA5','#3B6D11','#854F0B','#6B3FA0','#0F7B6C','#A32D2D','#1A6B8A','#7B5E00'];
  let h=0; for(let i=0;i<nombre.length;i++) h=(h*31+nombre.charCodeAt(i))&0xFFFFFF;
  return colors[Math.abs(h)%colors.length];
}

// ── CARGAR ─────────────────────────────────────────────────────
async function cargar(){
  document.getElementById('sync-dot').style.background='#fbbf24';
  document.getElementById('sync-text').textContent='Actualizando…';
  try{
    const r=await fetch(SCRIPT_URL+'?action=leer');
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    OPS=d.operaciones||[];
    document.getElementById('sync-dot').style.background='#4ade80';
    document.getElementById('sync-text').textContent='Actualizado: '+new Date().toLocaleTimeString('es-PY');
    renderRanking();
    resetCountdown();
  } catch(e){
    document.getElementById('sync-dot').style.background='#f87171';
    document.getElementById('sync-text').textContent='Error al conectar';
  }
}

// ── RANKING ────────────────────────────────────────────────────
function renderRanking(){
  const hoy  = hoyKey();
  const lunes = lunesKey();

  document.getElementById('semana-label').textContent = fmtSemana();

  // agrupar por técnico
  const mapa = {};
  OPS.forEach(o=>{
    const k = o.legajo||'–';
    if(!mapa[k]) mapa[k]={ legajo:k, nombre:o.tecnico||'Sin nombre', ops:[] };
    mapa[k].ops.push(o);
  });

  const lista = Object.values(mapa).map(t=>{
    const notif = t.ops.filter(o=>o.estado==='notificada');
    const pend  = t.ops.filter(o=>o.estado!=='notificada').length;
    const hsSemana = notif
      .filter(o=>{ const f=normF(o['fecha realizacion']||o['fecha realización']||o.fecha); return f>=lunes&&f<=hoy; })
      .reduce((a,o)=>a+calcH(o['hora inicio']||'',o['hora fin']||''),0);
    return { ...t, pend, hsSemana:+hsSemana.toFixed(1) };
  });

  // ordenar: más horas primero, desempate por menos pendientes
  lista.sort((a,b)=>{
    if(b.hsSemana !== a.hsSemana) return b.hsSemana - a.hsSemana;
    return a.pend - b.pend;
  });

  // asignar posiciones (empate = misma posición)
  let pos=1;
  for(let i=0;i<lista.length;i++){
    if(i>0 && lista[i].hsSemana===lista[i-1].hsSemana && lista[i].pend===lista[i-1].pend){
      lista[i].pos = lista[i-1].pos;
    } else {
      lista[i].pos = pos;
    }
    pos++;
  }

  const maxH = Math.max(...lista.map(t=>t.hsSemana), 1);

  document.getElementById('footer-total').textContent =
    `${lista.length} técnicos · ${OPS.filter(o=>o.estado==='notificada').length} OS notificadas · ${OPS.filter(o=>o.estado!=='notificada').length} pendientes`;

  document.getElementById('main').innerHTML = `
  <div class="ranking-wrap">
    <table class="ranking-table">
      <thead>
        <tr>
          <th>Pos.</th>
          <th>Técnico</th>
          <th style="text-align:center">Horas semana</th>
          <th style="text-align:center">OS pendientes</th>
        </tr>
      </thead>
      <tbody>
        ${lista.map(t=>{
          const av = t.nombre.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
          const color = avatarColor(t.nombre);
          const posClass = t.pos===1?'pos-1':t.pos===2?'pos-2':t.pos===3?'pos-3':'pos-other';
          const posEmoji = t.pos===1?'🥇':t.pos===2?'🥈':t.pos===3?'🥉':t.pos;
          const barW = Math.round((t.hsSemana/maxH)*100);
          const pendClass = t.pend===0?'pend-0':t.pend<=3?'pend-low':'pend-high';
          return `<tr>
            <td class="pos-cell">
              <div class="pos-badge ${posClass}">${posEmoji}</div>
            </td>
            <td class="nombre-cell">
              <div class="tec-row">
                <div class="tec-av" style="background:${color}">${av}</div>
                <div>
                  <div class="tec-nombre">${t.nombre}</div>
                  <div class="tec-legajo">Legajo ${t.legajo}</div>
                </div>
              </div>
            </td>
            <td class="horas-cell">
              <div class="horas-value">${t.hsSemana}h</div>
              <div class="horas-bar-wrap"><div class="horas-bar" style="width:${barW}%;background:${color}"></div></div>
            </td>
            <td class="pend-cell">
              <div class="pend-badge ${pendClass}">${t.pend}</div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

// ── COUNTDOWN ──────────────────────────────────────────────────
function resetCountdown(){
  countdownSec = REFRESH_SEC;
  clearInterval(countdownInterval);
  countdownInterval = setInterval(()=>{
    countdownSec--;
    if(countdownSec<=0){ clearInterval(countdownInterval); cargar(); return; }
    const m=Math.floor(countdownSec/60), s=countdownSec%60;
    document.getElementById('countdown-text').textContent = m+':'+String(s).padStart(2,'0');
    document.getElementById('countdown-fill').style.width = (countdownSec/REFRESH_SEC*100)+'%';
  },1000);
}

// ── EXPORT ─────────────────────────────────────────────────────
function abrirExport(){ document.getElementById('modal').classList.add('open'); }
function cerrarModal(){ document.getElementById('modal').classList.remove('open'); }

function exportarSAP(){
  cerrarModal();
  const notif = OPS.filter(o=>o.estado==='notificada'&&!o.cerrado_sap);
  if(!notif.length){ alert('No hay operaciones notificadas para exportar.'); return; }

  const fmtFecha = val=>{ const iso=normF(val); if(!iso) return ''; const[y,m,d]=iso.split('-'); return d+'.'+m+'.'+y; };
  const fmtHora  = h=>{ if(!h) return ''; const p=String(h).split(':'); return p[0].padStart(2,'0')+':'+(p[1]||'00').padStart(2,'0')+':00'; };

  const wsData = [
    ['ORDEN','FECHA','FECHA','HS INICIO','HS FIN','HRS TRABJ.','LEGAJO1'],
    ...notif.map(o=>{
      const ini=o['hora inicio']||'', fin=o['hora fin']||'';
      const fecha=fmtFecha(o['fecha realizacion']||o['fecha realización']||o.fecha);
      const h=calcH(ini,fin);
      return [String(o.os||'').trim(), fecha, fecha, fmtHora(ini), fmtHora(fin), h?parseFloat(h.toFixed(1)):0, String(o.legajo||'').trim()];
    })
  ];

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  for(let r=1;r<wsData.length;r++){
    const cr=XLSX.utils.encode_cell({r,c:5});
    if(ws[cr]){ ws[cr].t='n'; ws[cr].z='0.0##'; delete ws[cr].w; }
  }
  ws['!cols']=[{wch:14},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'Notificaciones');
  XLSX.writeFile(wb,'SAP_notificaciones_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

// ── INIT ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{ cargar(); });
</script>
</body>
</html>
